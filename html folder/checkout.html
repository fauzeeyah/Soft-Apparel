<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Soft Apparel</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <ul class="nav-links">
                    <li><a href="/html folder/home.html"><span>Home</span></a></li>
                    <li><a href="/html folder/shop.html"><span>Shop</span></a></li>
                    <li><a href="/html folder/about_us.html"><span>About Us</span></a></li>
                    <li><a href="/html folder/size_guide.html"><span>Size Guide</span></a></li>
                </ul>
            </div>
            <div class="nav-center logo">
                <img src="images/soft Apparel.JPG" alt="Soft Apparel Logo">
            </div>
            <div class="nav-right search-login">
                <a href="#"><i class="fa fa-search"></i></a>
                <a href="#" id="login-icon" onclick="showLoginForm()"><i class="fa fa-user"></i></a>
                <a href="/checkout.html" id="cart-icon">
                    <i class="fa fa-shopping-cart"></i>
                    <span id="cart-count" class="cart-count"></span>
                </a>
            </div>
        </nav>
    </header>
    <main>
        <section class="checkout-section">
            <h1>Checkout</h1>
            <div id="checkout-items"></div>
            <div class="checkout-total">
                <p>Total: £<span id="checkout-total-price">0</span></p>
                <div class="payment-options">
                    <h2>Payment Options</h2>
                    <div class="payment-method">
                        <input type="radio" id="paypal" name="payment" value="paypal" checked>
                        <label for="paypal">PayPal</label>
                    </div>
                    <div class="payment-method">
                        <input type="radio" id="credit-card" name="payment" value="credit-card">
                        <label for="credit-card">Credit Card</label>
                    </div>
                    <!-- Add more payment methods here -->
                </div>
                <button id="place-order-button">Place Order</button>
            </div>
        </section>
    </main>
    <footer>
        <div class="footer-container">
            <!-- Footer content as before -->
        </div>
    </footer>
    <script src="/js folder/cart.js"></script>
    <script src="/js folder/checkout.js"></script>
</body>
</html>
